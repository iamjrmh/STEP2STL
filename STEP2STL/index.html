<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP → STL Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">

    <header>
      <div class="wordmark">
        <span class="wordmark-step">STEP</span>
        <span class="wordmark-arrow">→</span>
        <span class="wordmark-stl">STL</span>
      </div>
      <p class="tagline">Drop your .step files. Get .stl files back. Originals moved to <code>/originals</code>.</p>
    </header>

    <main>
      <!-- Drop Zone -->
      <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Drop STEP files here or click to browse">
        <div class="scan-line" id="scanLine"></div>
        <div class="dropzone-inner">
          <div class="drop-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="4" width="22" height="28" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M22 4v8h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M20 22v8M16 26l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="30" cy="30" r="8" fill="#0d0f10" stroke="var(--accent)" stroke-width="1.5"/>
              <path d="M30 26v8M26 30h8" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="drop-primary">Drop .step / .stp files here</p>
          <p class="drop-secondary">or <button class="browse-btn" id="browseBtn">browse files</button></p>
        </div>
        <input type="file" id="fileInput" multiple accept=".step,.stp" style="display:none" />
      </div>

      <!-- Queue -->
      <div class="queue" id="queue" hidden>
        <div class="queue-header">
          <span class="queue-label">QUEUED</span>
          <span class="queue-count" id="queueCount">0 files</span>
        </div>
        <ul class="file-list" id="fileList"></ul>
        <div class="queue-actions">
          <button class="btn-convert" id="convertBtn">Convert all</button>
          <button class="btn-clear" id="clearBtn">Clear</button>
        </div>
      </div>

      <!-- Log -->
      <div class="log-panel" id="logPanel" hidden>
        <div class="log-header">
          <span class="log-label">OUTPUT</span>
          <button class="log-clear" id="logClearBtn">clear</button>
        </div>
        <div class="log-body" id="logBody"></div>
      </div>
    </main>

    <footer>
      <p>Runs entirely in your browser via <a href="https://github.com/octocat/opencascade.js" target="_blank" rel="noopener">opencascade.js</a> — no files are uploaded anywhere.</p>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
